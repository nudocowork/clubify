version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clubify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-clubify}
    volumes:
      - clubify_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - clubify_redis:/data

  backend:
    build:
      context: ../backend
    restart: always
    env_file: ../backend/.env
    depends_on: [postgres, redis]
    ports: ['3001:3001']
    volumes:
      - ../backend/certs:/app/certs:ro

  frontend:
    build:
      context: ../frontend
    restart: always
    env_file: ../frontend/.env.local
    depends_on: [backend]
    ports: ['3000:3000']

  caddy:
    image: caddy:2-alpine
    restart: always
    ports: ['80:80', '443:443']
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - clubify_caddy_data:/data
      - clubify_caddy_config:/config
    depends_on: [backend, frontend]

volumes:
  clubify_pg:
  clubify_redis:
  clubify_caddy_data:
  clubify_caddy_config:
