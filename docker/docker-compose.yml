version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clubify
      POSTGRES_PASSWORD: clubify
      POSTGRES_DB: clubify
    ports: ['5432:5432']
    volumes:
      - clubify_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clubify']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes:
      - clubify_redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - clubify_minio:/data

volumes:
  clubify_pg:
  clubify_redis:
  clubify_minio:
